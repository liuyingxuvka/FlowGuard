contract_version: 3
change: harden-model-code-test-closure
evidence_roots:
  SPEC_EVIDENCE: .flowguard/evidence/spec-work-packages
obligations:
  - id: req.model-test-alignment.source-audit-gate
    source: "specs/model-test-alignment/spec.md#Requirement: Source audit can gate real-code alignment"
    claim: "Required source audit blocks missing, failed, or unrelated real-code audit evidence."
    required: true
    evidence: [owner.change.aggregate]
  - id: req.model-test-alignment.binding-row-summary
    source: "specs/model-test-alignment/spec.md#Requirement: Binding rows summarize behavior closure"
    claim: "Binding rows expose owner code, path/symbol, tests, runtime/boundary/payload ids, source decision, and open gaps."
    required: true
    evidence: [owner.change.aggregate]
  - id: req.model-test-alignment.target-aware-bad-case-closure
    source: "specs/model-test-alignment/spec.md#Requirement: Counterexample and known-bad obligations close through target-aware code tests"
    claim: "Counterexample and known-bad closure requires current external owner-code-bound test evidence for the same target id."
    required: true
    evidence: [owner.change.aggregate]
  - id: req.runtime-gateway.structured-writer-inventory
    source: "specs/runtime-gateway-adoption/spec.md#Requirement: Runtime gateway claims use structured writer inventory evidence"
    claim: "Runtime-gateway claims require structured, current, passing writer inventory evidence that covers critical surfaces and has proof artifacts."
    required: true
    evidence: [owner.change.aggregate]
  - id: req.post-runtime-model-miss.target-projection
    source: "specs/post-runtime-model-miss-review/spec.md#Requirement: Model-miss counterexamples project into Model-Test Alignment closure"
    claim: "Model-miss guidance and model regressions project counterexamples and known-bad misses into target-aware owner-code-bound test closure."
    required: true
    evidence: [owner.change.aggregate]
checks:
  - id: owner.change.aggregate
    kind: receipt
    semantic_check_id: flowguard.openspec.harden-model-code-test-closure.aggregate
    execution_id: flowguard.owner.harden-model-code-test-closure.aggregate.current
    receipt_ref:
      provider_id: openspec
      work_package_id: harden-model-code-test-closure
      adapter: portable-receipt.v1
      ref_path: "<SPEC_EVIDENCE>/portable-refs/openspec/harden-model-code-test-closure/owner.change.aggregate.json"
    consumer: openspec.change.harden-model-code-test-closure
    required: true
    covers:
      - req.model-test-alignment.source-audit-gate
      - req.model-test-alignment.binding-row-summary
      - req.model-test-alignment.target-aware-bad-case-closure
      - req.runtime-gateway.structured-writer-inventory
      - req.post-runtime-model-miss.target-projection
freshness:
  watch:
    - openspec/changes/harden-model-code-test-closure/proposal.md
    - openspec/changes/harden-model-code-test-closure/design.md
    - openspec/changes/harden-model-code-test-closure/tasks.md
    - openspec/changes/harden-model-code-test-closure/specs/**/*.md
    - openspec/changes/harden-model-code-test-closure/verification-contract.yaml
    - flowguard/model_test_alignment.py
    - flowguard/model_test_alignment_source.py
    - flowguard/runtime_gateway.py
    - flowguard/__init__.py
    - flowguard/template_text/**/*.py
    - tests/test_model_test_alignment.py
    - tests/test_runtime_gateway_adoption.py
    - tests/test_api_surface.py
    - tests/test_public_templates.py
    - tests/test_skill_docs.py
    - .flowguard/contract_source_audit/**/*.py
    - .flowguard/model_test_code_alignment/**/*.py
    - .flowguard/model_miss_review/**/*.py
    - .agents/skills/**/*.md
    - docs/**/*.md
