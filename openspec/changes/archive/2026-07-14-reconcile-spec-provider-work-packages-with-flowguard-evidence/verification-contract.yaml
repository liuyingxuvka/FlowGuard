contract_version: 1
change: reconcile-spec-provider-work-packages-with-flowguard-evidence
evidence_roots:
  SPEC_EVIDENCE: .flowguard/evidence/spec-work-packages

obligations:
  - id: req.infrastructure.models-full
    source: "proposal.md"
    claim: "The registered FlowGuard model inventory passes once on the frozen source snapshot and may be reused only through an exact cross-change-safe receipt."
    required: true
    evidence: [owner.models.full]

  - id: req.infrastructure.tests-full
    source: "proposal.md"
    claim: "Full pytest passes once after the model inventory on the same frozen source snapshot and may be reused only through an exact cross-change-safe receipt."
    required: true
    evidence: [owner.tests.full]

  - id: req.spec.provider-authority
    source: "specs/spec-provider-work-packages/spec.md#Requirement: Specification providers retain native authority"
    claim: "OpenSpec consumes FlowGuard-owned receipts and never reexecutes their physical checks."
    required: true
    evidence: [owner.change.aggregate]

  - id: req.spec.stable-identities
    source: "specs/spec-provider-work-packages/spec.md#Requirement: Work-package identities are stable and plane-safe"
    claim: "semantic_check_id, execution_id, and execution_key remain distinct."
    required: true
    evidence: [owner.change.aggregate]

  - id: req.spec.bidirectional-reconciliation
    source: "specs/spec-provider-work-packages/spec.md#Requirement: Task and obligation reconciliation is bidirectionally complete"
    claim: "Every in-scope obligation reaches one canonical owner receipt and one provider consumer."
    required: true
    evidence: [owner.change.aggregate]

  - id: req.spec.input-output-boundary
    source: "specs/spec-provider-work-packages/spec.md#Requirement: Canonical inputs and derived results are disjoint"
    claim: "Portable refs and receipts live in the persistent derived-evidence root."
    required: true
    evidence: [owner.change.aggregate]

  - id: req.spec.session-snapshots
    source: "specs/spec-provider-work-packages/spec.md#Requirement: Verification uses same-session begin and post snapshots"
    claim: "Owner receipts bind a frozen FlowGuard source manifest; provider rows bind one OpenSpec frozen snapshot."
    required: true
    evidence: [owner.change.aggregate]

  - id: req.spec.immutable-receipts
    source: "specs/spec-provider-work-packages/spec.md#Requirement: Check receipts are immutable and exact"
    claim: "Canonical owner receipts bind exact result, termination, source, toolchain, and child identities."
    required: true
    evidence: [owner.change.aggregate]

  - id: req.spec.safe-reuse
    source: "specs/spec-provider-work-packages/spec.md#Requirement: Reuse and deduplication are fail-closed"
    claim: "Only an independently reverified exact portable receipt may be reused."
    required: true
    evidence: [owner.change.aggregate]

  - id: req.spec.states
    source: "specs/spec-provider-work-packages/spec.md#Requirement: Provider reports distinguish execution states"
    claim: "Provider accounting distinguishes execution, reuse, stale, not-run, and blocked states."
    required: true
    evidence: [owner.change.aggregate]

  - id: req.spec.archive
    source: "specs/spec-provider-work-packages/spec.md#Requirement: Provider archive readiness is evidence-bound"
    claim: "Archive readiness is derived only by post-report read-only reconciliation."
    required: true
    evidence: [owner.change.aggregate]

  - id: req.process.work-packages
    source: "specs/development-process-flow/spec.md#Requirement: DevelopmentProcessFlow consumes spec work packages"
    claim: "DevelopmentProcessFlow owns execution order and reverse minimum revalidation."
    required: true
    evidence: [owner.change.aggregate]

  - id: req.testmesh.spec-receipts
    source: "specs/test-evidence-mesh/spec.md#Requirement: TestMesh governs spec-check receipt children"
    claim: "The parent receipt consumes the exact current child receipt set without executing covered children."
    required: true
    evidence: [owner.change.aggregate]

  - id: req.plan.provider-mapping
    source: "specs/plan-detailing-compiler/spec.md#Requirement: PlanDetail preserves provider task identity and mappings"
    claim: "PlanDetail preserves provider and canonical owner identities."
    required: true
    evidence: [owner.change.aggregate]

  - id: req.preflight.provider-context
    source: "specs/existing-model-preflight/spec.md#Requirement: ExistingModelPreflight consumes provider context after plane lookup"
    claim: "Provider context follows plane-first ownership lookup."
    required: true
    evidence: [owner.change.aggregate]

  - id: req.proof.session-identity
    source: "specs/proof-artifact-bound-evidence/spec.md#Requirement: Spec-check proof artifacts bind exact session identity"
    claim: "Proof projections preserve exact immutable session and receipt identity."
    required: true
    evidence: [owner.change.aggregate]

  - id: req.api.spec-work-package
    source: "specs/flowguard-api-registry/spec.md#Requirement: Spec work-package APIs have one public owner"
    claim: "One FlowGuard API and CLI expose portable receipt consumption and post-report close review."
    required: true
    evidence: [owner.change.aggregate]

  - id: req.skills.native-routing
    source: "specs/flowguard-codex-skill-satellites/spec.md#Requirement: Native skills route spec reconciliation through existing owners"
    claim: "Native skills route to existing FlowGuard owners instead of creating a second executor."
    required: true
    evidence: [owner.change.aggregate]

  - id: req.skills.current-authority
    source: "specs/flowguard-skill-suite-distribution/spec.md#Requirement: Managed skills have one current runtime authority"
    claim: "Each maintained skill has one current contract trio, rejects former runtime residuals, and proves execution only with owner receipts."
    required: true
    evidence: [owner.change.aggregate]


checks:
  - id: owner.models.full
    kind: receipt
    semantic_check_id: flowguard.models.full
    execution_id: flowguard.owner.models.full.v1
    receipt_ref:
      provider_id: openspec
      work_package_id: reconcile-spec-provider-work-packages-with-flowguard-evidence
      adapter: portable-receipt.v1
      ref_path: "<SPEC_EVIDENCE>/portable-refs/openspec/reconcile-spec-provider-work-packages-with-flowguard-evidence/owner.models.full.json"
    consumer: openspec.change.reconcile-spec-provider-work-packages-with-flowguard-evidence
    required: true
    covers: [req.infrastructure.models-full]

  - id: owner.tests.full
    kind: receipt
    semantic_check_id: flowguard.tests.full
    execution_id: flowguard.owner.tests.full.v1
    receipt_ref:
      provider_id: openspec
      work_package_id: reconcile-spec-provider-work-packages-with-flowguard-evidence
      adapter: portable-receipt.v1
      ref_path: "<SPEC_EVIDENCE>/portable-refs/openspec/reconcile-spec-provider-work-packages-with-flowguard-evidence/owner.tests.full.json"
    consumer: openspec.change.reconcile-spec-provider-work-packages-with-flowguard-evidence
    required: true
    covers: [req.infrastructure.tests-full]

  - id: owner.spec.focused
    kind: receipt
    semantic_check_id: flowguard.spec-work-package.focused
    execution_id: flowguard.owner.spec.focused.v1
    receipt_ref:
      provider_id: openspec
      work_package_id: reconcile-spec-provider-work-packages-with-flowguard-evidence
      adapter: portable-receipt.v1
      ref_path: "<SPEC_EVIDENCE>/portable-refs/openspec/reconcile-spec-provider-work-packages-with-flowguard-evidence/owner.spec.focused.json"
    consumer: openspec.change.reconcile-spec-provider-work-packages-with-flowguard-evidence
    required: true
    covers: [req.spec.provider-authority, req.spec.stable-identities, req.spec.bidirectional-reconciliation, req.spec.input-output-boundary, req.spec.immutable-receipts, req.spec.archive, req.proof.session-identity]

  - id: owner.process.focused
    kind: receipt
    semantic_check_id: flowguard.spec-owner-process.focused
    execution_id: flowguard.owner.process.focused.v1
    receipt_ref:
      provider_id: openspec
      work_package_id: reconcile-spec-provider-work-packages-with-flowguard-evidence
      adapter: portable-receipt.v1
      ref_path: "<SPEC_EVIDENCE>/portable-refs/openspec/reconcile-spec-provider-work-packages-with-flowguard-evidence/owner.process.focused.json"
    consumer: openspec.change.reconcile-spec-provider-work-packages-with-flowguard-evidence
    required: true
    covers: [req.spec.input-output-boundary, req.process.work-packages, req.testmesh.spec-receipts, req.plan.provider-mapping, req.preflight.provider-context]

  - id: owner.model.focused
    kind: receipt
    semantic_check_id: flowguard.spec-work-package.model
    execution_id: flowguard.owner.model.focused.v1
    receipt_ref:
      provider_id: openspec
      work_package_id: reconcile-spec-provider-work-packages-with-flowguard-evidence
      adapter: portable-receipt.v1
      ref_path: "<SPEC_EVIDENCE>/portable-refs/openspec/reconcile-spec-provider-work-packages-with-flowguard-evidence/owner.model.focused.json"
    consumer: openspec.change.reconcile-spec-provider-work-packages-with-flowguard-evidence
    required: true
    covers: [req.spec.session-snapshots, req.spec.safe-reuse]

  - id: owner.api.focused
    kind: receipt
    semantic_check_id: flowguard.spec-work-package.api-cli
    execution_id: flowguard.owner.api.focused.v1
    receipt_ref:
      provider_id: openspec
      work_package_id: reconcile-spec-provider-work-packages-with-flowguard-evidence
      adapter: portable-receipt.v1
      ref_path: "<SPEC_EVIDENCE>/portable-refs/openspec/reconcile-spec-provider-work-packages-with-flowguard-evidence/owner.api.focused.json"
    consumer: openspec.change.reconcile-spec-provider-work-packages-with-flowguard-evidence
    required: true
    covers: [req.spec.states, req.api.spec-work-package]

  - id: owner.skills.focused
    kind: receipt
    semantic_check_id: flowguard.skills.focused
    execution_id: flowguard.owner.skills.focused.v1
    receipt_ref:
      provider_id: openspec
      work_package_id: reconcile-spec-provider-work-packages-with-flowguard-evidence
      adapter: portable-receipt.v1
      ref_path: "<SPEC_EVIDENCE>/portable-refs/openspec/reconcile-spec-provider-work-packages-with-flowguard-evidence/owner.skills.focused.json"
    consumer: openspec.change.reconcile-spec-provider-work-packages-with-flowguard-evidence
    required: true
    covers: [req.skills.native-routing, req.skills.current-authority]

  - id: owner.change.aggregate
    kind: receipt
    semantic_check_id: flowguard.spec-work-package.aggregate
    execution_id: flowguard.owner.change.aggregate.v1
    receipt_ref:
      provider_id: openspec
      work_package_id: reconcile-spec-provider-work-packages-with-flowguard-evidence
      adapter: portable-receipt.v1
      ref_path: "<SPEC_EVIDENCE>/portable-refs/openspec/reconcile-spec-provider-work-packages-with-flowguard-evidence/owner.change.aggregate.json"
    consumer: openspec.change.reconcile-spec-provider-work-packages-with-flowguard-evidence
    required: true
    covers: [req.spec.provider-authority, req.spec.stable-identities, req.spec.bidirectional-reconciliation, req.spec.input-output-boundary, req.spec.session-snapshots, req.spec.immutable-receipts, req.spec.safe-reuse, req.spec.states, req.spec.archive, req.process.work-packages, req.testmesh.spec-receipts, req.plan.provider-mapping, req.preflight.provider-context, req.proof.session-identity, req.api.spec-work-package, req.skills.native-routing, req.skills.current-authority]

freshness:
  watch:
    - openspec/changes/reconcile-spec-provider-work-packages-with-flowguard-evidence/proposal.md
    - openspec/changes/reconcile-spec-provider-work-packages-with-flowguard-evidence/design.md
    - openspec/changes/reconcile-spec-provider-work-packages-with-flowguard-evidence/tasks.md
    - openspec/changes/reconcile-spec-provider-work-packages-with-flowguard-evidence/specs/**/*.md
    - openspec/changes/reconcile-spec-provider-work-packages-with-flowguard-evidence/verification-contract.yaml
    - openspec/specs/**/*.md
    - flowguard/**/*.py
    - .flowguard/spec_provider_work_packages/**/*.py
    - .flowguard/spec_provider_work_packages/bindings.json
    - docs/**/*.md
    - tests/**/*.py
    - AGENTS.md
    - README.md
    - CHANGELOG.md
    - pyproject.toml
