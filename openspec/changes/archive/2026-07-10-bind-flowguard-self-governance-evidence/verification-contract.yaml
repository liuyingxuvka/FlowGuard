contract_version: 1
change: bind-flowguard-self-governance-evidence
obligations:
  - id: req.receipts.schema
    source: "specs/flowguard-evidence-receipts/spec.md#Requirement: Immutable Evidence Receipt Schema"
    claim: "Receipts are complete, canonical, immutable evidence records."
    required: true
    evidence: [check.receipt.tests]
  - id: req.receipts.freshness
    source: "specs/flowguard-evidence-receipts/spec.md#Requirement: Freshness Is Derived From Current Inputs"
    claim: "Current status is derived and any bound input/check/contract change makes evidence stale."
    required: true
    evidence: [check.receipt.tests, check.self-governance]
  - id: req.receipts.children
    source: "specs/flowguard-evidence-receipts/spec.md#Requirement: Exact Parent Child Consumption"
    claim: "Parents consume exact current child receipts and superseded/unconsumed children fail."
    required: true
    evidence: [check.receipt.tests, check.self-governance.tests]
  - id: req.receipts.privacy
    source: "specs/flowguard-evidence-receipts/spec.md#Requirement: Receipt Privacy And Storage Boundary"
    claim: "Receipts tokenize private paths and current results are not packaged as universal installed truth."
    required: true
    evidence: [check.receipt.tests]
  - id: req.self.real-children
    source: "specs/flowguard-self-maintenance-mesh/spec.md#Requirement: Parent Closure Consumes Real Child Receipts"
    claim: "Full self-maintenance loads all required real child receipts."
    required: true
    evidence: [check.self-governance.tests, check.self-governance, check.self-model]
  - id: req.self.no-synthetic
    source: "specs/flowguard-self-maintenance-mesh/spec.md#Requirement: Synthetic Evidence Transitions Are Forbidden"
    claim: "No model or runner can manufacture full evidence flags/pass reports."
    required: true
    evidence: [check.self-governance.tests, check.self-model]
  - id: req.self.status
    source: "specs/flowguard-self-maintenance-mesh/spec.md#Requirement: Full Governance Uses Exact Status Semantics"
    claim: "Only current exact pass satisfies full required children."
    required: true
    evidence: [check.formal.tests, check.self-governance]
  - id: req.self.layers
    source: "specs/flowguard-self-maintenance-mesh/spec.md#Requirement: Three Layer Governance Status"
    claim: "Engine, skill-contract, and full-self-governance status are reported separately."
    required: true
    evidence: [check.self-governance.tests, check.self-governance]
  - id: req.proof.binding
    source: "specs/proof-artifact-bound-evidence/spec.md#Requirement: Proof Artifacts Bind To Verification Inputs"
    claim: "Proof artifacts bind all required hashes, versions, command facts, and obligation ids."
    required: true
    evidence: [check.receipt.tests]
  - id: req.proof.obligations
    source: "specs/proof-artifact-bound-evidence/spec.md#Requirement: Covered Obligations Are Explicit"
    claim: "Aggregate green results without obligation mappings prove no required obligation."
    required: true
    evidence: [check.receipt.tests, check.alignment.tests]
  - id: req.proof.hash-policy
    source: "specs/proof-artifact-bound-evidence/spec.md#Requirement: Raw And Semantic Hash Policies Are Declared"
    claim: "Raw and semantic hash policies are explicit and raw-required parity cannot be masked."
    required: true
    evidence: [check.receipt.tests]
  - id: req.alignment.suite
    source: "specs/model-test-alignment/spec.md#Requirement: Suite Commitments Map To Owners And Tests"
    claim: "Every external commitment maps bidirectionally to one owner, scenarios, TestMesh, and receipt."
    required: true
    evidence: [check.alignment.tests, check.self-governance]
  - id: req.alignment.ppa
    source: "specs/model-test-alignment/spec.md#Requirement: Path Sensitive Commitments Require PPA Evidence"
    claim: "Every path-sensitive commitment consumes current PPA/CEM/TestMesh/Risk evidence."
    required: true
    evidence: [check.alignment.tests]
  - id: req.alignment.current-tests
    source: "specs/model-test-alignment/spec.md#Requirement: Alignment Closure Requires Current TestMesh Receipts"
    claim: "Every aligned test obligation is backed by a current scoped TestMesh receipt."
    required: true
    evidence: [check.alignment.tests, check.self-governance]
checks:
  - id: check.receipt.tests
    kind: command
    command: python
    args: [-m, pytest, tests/test_evidence_receipts.py, tests/test_proof_artifact_binding.py, -q]
    required: true
    covers: [req.receipts.schema, req.receipts.freshness, req.receipts.children, req.receipts.privacy, req.proof.binding, req.proof.obligations, req.proof.hash-policy]
    expected: {exit_code: 0}
  - id: check.self-governance.tests
    kind: command
    command: python
    args: [-m, pytest, tests/test_skill_self_governance.py, tests/test_flowguard_self_review.py, tests/test_flowguard_self_review_conformance.py, -q]
    required: true
    covers: [req.receipts.children, req.self.real-children, req.self.no-synthetic, req.self.layers]
    expected: {exit_code: 0}
  - id: check.formal.tests
    kind: command
    command: python
    args: [-m, pytest, tests/test_formal_runner.py, -q]
    required: true
    covers: [req.self.status]
    expected: {exit_code: 0}
  - id: check.alignment.tests
    kind: command
    command: python
    args: [-m, pytest, tests/test_behavior_commitment_ledger.py, tests/test_model_test_alignment.py, tests/test_test_mesh.py, tests/test_primary_path_authority_release_gate_matrix.py, -q]
    required: true
    covers: [req.proof.obligations, req.alignment.suite, req.alignment.ppa, req.alignment.current-tests]
    expected: {exit_code: 0}
  - id: check.self-model
    kind: command
    command: python
    args: [.flowguard/self_maintenance_mesh/run_checks.py]
    required: true
    covers: [req.self.real-children, req.self.no-synthetic]
    expected: {exit_code: 0}
  - id: check.self-governance
    kind: command
    command: python
    args: [scripts/run_flowguard_self_governance.py, --root, ., --json]
    required: true
    covers: [req.receipts.freshness, req.self.real-children, req.self.status, req.self.layers, req.alignment.suite, req.alignment.current-tests]
    expected: {exit_code: 0}
  - id: check.openspec.strict
    kind: command
    command: openspec
    args: [validate, bind-flowguard-self-governance-evidence, --strict]
    required: true
    covers: [req.receipts.schema, req.receipts.freshness, req.receipts.children, req.receipts.privacy, req.self.real-children, req.self.no-synthetic, req.self.status, req.self.layers, req.proof.binding, req.proof.obligations, req.proof.hash-policy, req.alignment.suite, req.alignment.ppa, req.alignment.current-tests]
    expected: {exit_code: 0}
freshness:
  watch:
    - openspec/changes/bind-flowguard-self-governance-evidence/**/*.md
    - openspec/changes/bind-flowguard-self-governance-evidence/verification-contract.yaml
    - .skillguard/flowguard-suite/suite-map.json
    - .agents/skills/*/SKILL.md
    - .agents/skills/*/.skillguard/**/*.json
    - flowguard/evidence_receipts.py
    - flowguard/skill_self_governance.py
    - flowguard/self_maintenance.py
    - flowguard/formal_runner.py
    - flowguard/behavior_commitment.py
    - flowguard/model_test_alignment.py
    - .flowguard/self_maintenance_mesh/**/*.py
    - .flowguard/behavior_commitment_ledger/**/*.py
    - tests/test_evidence_receipts.py
    - tests/test_proof_artifact_binding.py
    - tests/test_skill_self_governance.py
    - tests/test_formal_runner.py
    - tests/test_behavior_commitment_ledger.py
    - tests/test_model_test_alignment.py
    - tests/test_test_mesh.py
    - scripts/run_flowguard_self_governance.py
