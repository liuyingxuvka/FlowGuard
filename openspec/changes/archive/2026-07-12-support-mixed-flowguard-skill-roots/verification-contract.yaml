contract_version: 1
change: support-mixed-flowguard-skill-roots
obligations:
  - id: req.skill-suite.ownership-backed-mixed-root
    source: "specs/flowguard-skill-suite-distribution/spec.md#Requirement: Canonical suite validation supports ownership-backed mixed roots"
    claim: "A valid official ownership boundary allows unrelated skills while missing, invalid, or FlowGuard-like undeclared members remain blocking."
    required: true
    evidence:
      - check.skill-suite.focused-tests
      - check.distribution.regression
  - id: req.skill-suite.report-visibility
    source: "specs/flowguard-skill-suite-distribution/spec.md#Requirement: Mixed-root reports preserve foreign-skill visibility"
    claim: "Passing mixed-root reports expose canonical members and co-located skills as distinct fields with a scoped claim boundary."
    required: true
    evidence:
      - check.skill-suite.focused-tests
  - id: req.project-adoption.mixed-root-consumption
    source: "specs/project-adoption-version-gate/spec.md#Requirement: Project adoption consumes strict mixed-root suite evidence"
    claim: "Project audit and upgrade accept a complete ownership-backed mixed root but remain blocked for missing or fake FlowGuard members."
    required: true
    evidence:
      - check.project-adoption.focused-tests
      - check.project-adoption.model
  - id: req.change.openspec-valid
    source: "proposal.md"
    claim: "The change artifacts remain structurally valid under strict OpenSpec validation."
    required: true
    evidence:
      - check.openspec.strict
checks:
  - id: check.skill-suite.focused-tests
    kind: command
    command: python
    args:
      - -m
      - pytest
      - tests/test_skill_suite_inventory.py
      - -q
    required: true
    covers:
      - req.skill-suite.ownership-backed-mixed-root
      - req.skill-suite.report-visibility
    expected:
      exit_code: 0
  - id: check.project-adoption.focused-tests
    kind: command
    command: python
    args:
      - -m
      - pytest
      - tests/test_project_adoption.py
      - -q
    required: true
    covers:
      - req.project-adoption.mixed-root-consumption
    expected:
      exit_code: 0
  - id: check.distribution.regression
    kind: command
    command: python
    args:
      - -m
      - pytest
      - tests/test_distribution_sync.py
      - -q
    required: true
    covers:
      - req.skill-suite.ownership-backed-mixed-root
    expected:
      exit_code: 0
  - id: check.project-adoption.model
    kind: command
    command: python
    args:
      - .flowguard/project_adoption_version_gate/run_checks.py
    required: true
    covers:
      - req.project-adoption.mixed-root-consumption
    expected:
      exit_code: 0
  - id: check.openspec.strict
    kind: command
    command: openspec
    args:
      - validate
      - support-mixed-flowguard-skill-roots
      - --strict
      - --json
    required: true
    covers:
      - req.change.openspec-valid
    expected:
      exit_code: 0
freshness:
  watch:
    - openspec/changes/support-mixed-flowguard-skill-roots/proposal.md
    - openspec/changes/support-mixed-flowguard-skill-roots/design.md
    - openspec/changes/support-mixed-flowguard-skill-roots/tasks.md
    - openspec/changes/support-mixed-flowguard-skill-roots/specs/**/*.md
    - openspec/changes/support-mixed-flowguard-skill-roots/verification-contract.yaml
    - flowguard/skill_suite.py
    - flowguard/project_adoption.py
    - flowguard/distribution_sync.py
    - tests/test_skill_suite_inventory.py
    - tests/test_project_adoption.py
    - tests/test_distribution_sync.py
    - .flowguard/project_adoption_version_gate/model.py
    - .flowguard/project_adoption_version_gate/run_checks.py
