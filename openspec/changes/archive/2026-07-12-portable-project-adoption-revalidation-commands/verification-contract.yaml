contract_version: 1
change: portable-project-adoption-revalidation-commands
obligations:
  - id: req.project-adoption.portable-report-commands
    source: "specs/project-adoption-version-gate/spec.md#Requirement: Generated revalidation commands are project-relative"
    claim: "Project-adoption reports expose exact project-relative audit and suite-verification commands without embedding the resolved target root."
    required: true
    evidence:
      - check.project-adoption.focused-tests
  - id: req.project-adoption.portable-human-log
    source: "specs/project-adoption-version-gate/spec.md#Requirement: Generated revalidation commands are project-relative"
    claim: "Writing adoption actions persist portable next actions in the Markdown log without the temporary target's absolute path."
    required: true
    evidence:
      - check.project-adoption.focused-tests
  - id: req.project-adoption.lifecycle-preserved
    source: "design.md"
    claim: "The existing project-adoption lifecycle and its known-bad proofs remain valid after the formatting-boundary repair."
    required: true
    evidence:
      - check.project-adoption.model
  - id: req.change.openspec-valid
    source: "proposal.md"
    claim: "The change remains structurally valid under strict OpenSpec validation."
    required: true
    evidence:
      - check.openspec.strict
checks:
  - id: check.project-adoption.focused-tests
    kind: command
    command: python
    args:
      - -m
      - pytest
      - tests/test_project_adoption.py
      - -q
    required: true
    covers:
      - req.project-adoption.portable-report-commands
      - req.project-adoption.portable-human-log
    expected:
      exit_code: 0
  - id: check.project-adoption.model
    kind: command
    command: python
    args:
      - .flowguard/project_adoption_version_gate/run_checks.py
    required: true
    covers:
      - req.project-adoption.lifecycle-preserved
    expected:
      exit_code: 0
  - id: check.openspec.strict
    kind: command
    command: openspec
    args:
      - validate
      - portable-project-adoption-revalidation-commands
      - --strict
      - --json
    required: true
    covers:
      - req.change.openspec-valid
    expected:
      exit_code: 0
freshness:
  watch:
    - openspec/changes/portable-project-adoption-revalidation-commands/.openspec.yaml
    - openspec/changes/portable-project-adoption-revalidation-commands/proposal.md
    - openspec/changes/portable-project-adoption-revalidation-commands/design.md
    - openspec/changes/portable-project-adoption-revalidation-commands/tasks.md
    - openspec/changes/portable-project-adoption-revalidation-commands/verification-contract.yaml
    - openspec/changes/portable-project-adoption-revalidation-commands/specs/**/*.md
    - openspec/specs/project-adoption-version-gate/spec.md
    - flowguard/project_adoption.py
    - tests/test_project_adoption.py
    - .flowguard/project_adoption_version_gate/model.py
    - .flowguard/project_adoption_version_gate/run_checks.py
