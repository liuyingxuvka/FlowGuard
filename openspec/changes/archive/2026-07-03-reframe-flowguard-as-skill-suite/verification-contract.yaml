contract_version: 1
change: reframe-flowguard-as-skill-suite
obligations:
  - id: req.skill_suite.primary_surface
    source: "specs/flowguard-skill-suite-distribution/spec.md#Requirement: FlowGuard is distributed as an AI-agent skill suite"
    claim: README and integration guidance identify .agents/skills as the primary AI-agent setup surface.
    required: true
    evidence:
      - check.docs.project_integration
      - check.project_adoption.template
      - check.docs.skill_docs
      - check.static.skill_suite_markers
  - id: req.skill_suite.check_scripts
    source: "specs/flowguard-skill-suite-distribution/spec.md#Requirement: Executable checks are presented as skill-attached scripts"
    claim: Public guidance treats executable FlowGuard code as check scripts/check execution rather than the skill install.
    required: true
    evidence:
      - check.docs.project_integration
      - check.check_scripts.smoke
      - check.static.skill_suite_markers
  - id: req.skill_suite.installed_sync
    source: "specs/flowguard-skill-suite-distribution/spec.md#Requirement: Local active behavior requires installed skill sync"
    claim: Local installed Codex FlowGuard skills include the current repository guidance markers.
    required: true
    evidence:
      - check.local.installed_skill_markers
  - id: req.ai_entry.skill_first
    source: "specs/flowguard-ai-entry-simplification/spec.md#Requirement: AI entry leads with the skill suite"
    claim: README quick start leads with skill-suite loading and does not present pip install as the first setup path.
    required: true
    evidence:
      - check.static.skill_suite_markers
  - id: req.kernel.entrypoint
    source: "specs/flowguard-skill-kernel/spec.md#Requirement: Kernel identifies the skill-suite entrypoint"
    claim: model-first-function-flow names itself as the default skill-suite entrypoint and points to sibling FlowGuard skills.
    required: true
    evidence:
      - check.docs.project_integration
      - check.docs.skill_docs
  - id: req.satellites.whole_suite_sync
    source: "specs/flowguard-codex-skill-satellites/spec.md#Requirement: Skill sync verifies the whole FlowGuard suite"
    claim: Repository and installed FlowGuard skill directories are checked as a complete suite.
    required: true
    evidence:
      - check.local.installed_skill_markers
  - id: req.project_integration.separation
    source: "specs/project-adoption-version-gate/spec.md#Requirement: Project integration separates skill setup from check commands"
    claim: Project integration separates skill-suite availability from project-record and check-execution commands.
    required: true
    evidence:
      - check.docs.project_integration
      - check.project_adoption.template
      - check.static.skill_suite_markers
checks:
  - id: check.openspec.validate
    kind: command
    command: openspec
    args:
      - validate
      - reframe-flowguard-as-skill-suite
      - --strict
    required: true
    covers:
      - req.skill_suite.primary_surface
      - req.project_integration.separation
    expected:
      exit_code: 0
  - id: check.docs.project_integration
    kind: command
    command: python
    args:
      - -m
      - unittest
      - tests.test_project_integration
    required: true
    covers:
      - req.skill_suite.primary_surface
      - req.skill_suite.check_scripts
      - req.kernel.entrypoint
      - req.project_integration.separation
    expected:
      exit_code: 0
  - id: check.project_adoption.template
    kind: command
    command: python
    args:
      - -m
      - unittest
      - tests.test_project_adoption
    required: true
    covers:
      - req.skill_suite.primary_surface
      - req.project_integration.separation
    expected:
      exit_code: 0
  - id: check.docs.skill_docs
    kind: command
    command: python
    args:
      - -m
      - unittest
      - tests.test_skill_docs
    required: true
    covers:
      - req.kernel.entrypoint
      - req.skill_suite.primary_surface
    expected:
      exit_code: 0
  - id: check.check_scripts.smoke
    kind: command
    command: python
    args:
      - examples/job_matching/run_checks.py
    required: true
    covers:
      - req.skill_suite.check_scripts
    expected:
      exit_code: 0
  - id: check.static.skill_suite_markers
    kind: command
    command: python
    args:
      - scripts/verify_skill_suite_markers.py
      - --root
      - .
    required: true
    covers:
      - req.skill_suite.primary_surface
      - req.skill_suite.check_scripts
      - req.ai_entry.skill_first
      - req.project_integration.separation
    expected:
      exit_code: 0
  - id: check.local.installed_skill_markers
    kind: command
    command: python
    args:
      - scripts/verify_skill_suite_markers.py
      - --root
      - .
      - --installed-root
      - <local-codex-skills-root>
    required: true
    covers:
      - req.skill_suite.installed_sync
      - req.satellites.whole_suite_sync
    expected:
      exit_code: 0
freshness:
  watch:
    - openspec/changes/reframe-flowguard-as-skill-suite/proposal.md
    - openspec/changes/reframe-flowguard-as-skill-suite/design.md
    - openspec/changes/reframe-flowguard-as-skill-suite/tasks.md
    - openspec/changes/reframe-flowguard-as-skill-suite/specs/**/*.md
    - openspec/changes/reframe-flowguard-as-skill-suite/verification-contract.yaml
    - README.md
    - AGENTS.md
    - docs/project_integration.md
    - docs/agents_snippet.md
    - .agents/skills/model-first-function-flow/SKILL.md
    - .agents/skills/model-first-function-flow/references/project_integration.md
    - .agents/skills/**/SKILL.md
    - flowguard/project_adoption.py
    - tests/test_project_integration.py
    - tests/test_skill_docs.py
    - tests/test_project_adoption.py
    - scripts/verify_skill_suite_markers.py
