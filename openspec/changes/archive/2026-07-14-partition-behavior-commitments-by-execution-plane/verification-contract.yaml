    - .agents/skills/flowguard-existing-model-preflight/**/*
    - .agents/skills/flowguard-model-miss-review/**/*
    - .agents/skills/flowguard-development-process-flow/**/*
    - .agents/skills/flowguard-agent-workflow-rehearsal/**/*
    - .agents/skills/flowguard-plan-detailing-compiler/**/*
    - .agents/skills/model-first-function-flow/**/*
    - AGENTS.md
