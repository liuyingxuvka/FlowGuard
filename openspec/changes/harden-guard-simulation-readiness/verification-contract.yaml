    - openspec/changes/harden-guard-simulation-readiness/specs/**/*.md
    - openspec/changes/harden-guard-simulation-readiness/verification-contract.yaml
    - pyproject.toml
    - flowguard/**/*.py
    - scripts/verify_guard_simulation_readiness.py
    - scripts/run_flowguard_model_regressions.py
    - tests/**/*.py
    - scripts/run_flowguard_model_regressions.py
    - .agents/skills/**/*.md
    - .agents/skills/**/.skillguard/**/*.json
    - .agents/skills/**/.skillguard/**/*.py
    - .flowguard/**/*.toml
