      provider_id: openspec
      work_package_id: harden-guard-simulation-readiness
      adapter: portable-receipt.v1
      ref_path: "<SPEC_EVIDENCE>/portable-refs/openspec/harden-guard-simulation-readiness/owner.change.aggregate.json"
    consumer: openspec.change.harden-guard-simulation-readiness
    required: true
    covers:
      - req.flowguard.diagram-semantics
      - req.flowguard.skill-contracts
freshness:
