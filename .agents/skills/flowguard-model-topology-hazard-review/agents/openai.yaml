interface:
  display_name: "FlowGuard Model Topology Hazard Review"
  short_description: "Anchor future-use hazards in model topology"
  default_prompt: "Use $flowguard-model-topology-hazard-review for route_id=model_topology_hazard_review, role=public_owner, native_owner=model_topology_hazard_review; require usage intent, topology anchors, real-use failure modes, dispositions, and typed owners; do not turn generic AI concerns into blockers or replace MTA/Risk Ledger/Reduction; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions; claim only anchored current hazards."
