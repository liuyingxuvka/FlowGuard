interface:
  display_name: "FlowGuard Model Topology Hazard Review"
  short_description: "Anchor future-use hazards in model topology"
  default_prompt: "Use $flowguard-model-topology-hazard-review for route_id=model_topology_hazard_review, role=public_owner, native_owner=model_topology_hazard_review; require usage intent, topology anchors, real-use failure modes, dispositions, and typed owners. Cross-model event/retry/resource/cache/atomicity/external-confirmation anchors may seed bounded interaction candidates, but reference a BCL/preflight-resolved property owner or emit owner_missing and never call a seed an executed finding. Do not turn generic AI concerns into blockers, invent authority, or replace MTA/Risk Ledger/Reduction; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions; claim only anchored current hazards. When creating or materially changing a concrete model instance, first freeze task/instance-specific one-or-many protected failures and the claim boundary, then bind the exact candidate plus native good, per-failure bad, oracle, and current evidence; reusable model types are not permanently single-purpose; FlowGuard owns semantics and only declared checks may support completion claims."
