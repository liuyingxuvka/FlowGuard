interface:
  display_name: "FlowGuard Existing Model Preflight"
  short_description: "Ground changes in current modeled ownership"
  default_prompt: "Use $flowguard-existing-model-preflight for route_id=existing_model_preflight, role=public_owner, native_owner=existing_model_preflight; query canonical commitments before path discovery, select one grounded primary behavior plane, keep ambiguous plane candidates and typed related hits separate, record lookup status/fingerprint/match reasons/owner models, then require current model search, ownership, complete expected surfaces, stable intent/commitment/path bindings, reuse decision, duplicate-risk review, and typed BCL/PPA handoff; never promote wrong-plane shared words or silently treat missing/stale ledger data as current; do not implement or validate the downstream change; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions; claim only preflight completeness."
