interface:
  display_name: "FlowGuard Model Miss Review"
  short_description: "Generalize and close post-green failure classes"
  default_prompt: "Use $flowguard-model-miss-review for route_id=model_miss_review, role=public_owner, native_owner=model_miss_review; require concrete failure evidence, commitment/owner mapping, miss classification, root-cause backpropagation, canonical same-class cases, and owner-code tests; do not close with a point patch or later green command; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions; claim only current bug-class closure."
