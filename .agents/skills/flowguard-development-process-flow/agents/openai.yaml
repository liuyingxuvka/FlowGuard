  default_prompt: "Use $flowguard-development-process-flow for route_id=development_process_flow, role=public_owner, native_owner=development_process_flow; keep lifecycle actions in development_process and reference product/agent commitments only as typed target context; select plan_detailing, agent_workflow, and execution_freshness modes, preserving receipts, continue/rework gates, current artifacts, triage, proof, post-change owner scan, and minimum revalidation; track freshness domains separately, treat background progress as liveness, and preserve/re-read/merge peer writes while staling affected evidence without rollback; do not replace specialist routes or product/agent behavior owners; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions; claim lifecycle readiness only for independently proved current domains."
