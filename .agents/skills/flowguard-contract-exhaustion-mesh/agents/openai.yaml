interface:
  display_name: "FlowGuard Contract Exhaustion Mesh"
  short_description: "Generate canonical finite-boundary bad cases"
  default_prompt: "Use $flowguard-contract-exhaustion-mesh for route_id=contract_exhaustion_mesh, role=public_owner, native_owner=contract_exhaustion_mesh; require a declared finite boundary, independently expected inventories, coverage universe for broad scope, actionable oracles, and typed consumers; generate missing/mismatched authority, wrong-path, parallel-success, stale-proof, omitted member/candidate, opaque-similarity, facade-delegation, fourth-visibility, internal-leak, and invalid-UI-exception cases when those owners declare the axes; do not act as a global bug oracle or run tests; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions; claim only generated-matrix readiness until downstream receipts close."
