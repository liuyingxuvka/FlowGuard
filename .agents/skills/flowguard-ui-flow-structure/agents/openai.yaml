interface:
  display_name: "FlowGuard UI Flow Structure"
  short_description: "Admit UI content and prove behavior, surface, operability"
  default_prompt: "Use $flowguard-ui-flow-structure for route_id=ui_flow_structure, role=public_owner, native_owner=ui_flow_structure; inventory the observed surface without treating observation as permission; classify state-exposing candidate content only as user_visible, user_on_demand, or internal, with no audience/role/persona taxonomy; require typed resolvable task/state/recovery/safety needs and exempt only exact normal labels for registered in-scope task-owned controls with no extra state, disabled reason, or metadata; block unclassified/internal ordinary-UI mapping; keep on-demand content hidden across display/text/visible/observed mappings until visible/enabled task-owned reveal with content-specific feedback and return, using a distinct keyboard/focus event for hover; then require capability/task coverage, UI event/state/recovery, human operability, observed inventory, and structured per-content visibility evidence; output content_visibility_plan, evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions."
