interface:
  display_name: "FlowGuard Test Mesh"
  short_description: "Govern layered test ownership and freshness"
  default_prompt: "Use $flowguard-test-mesh for route_id=test_mesh_maintenance, role=public_owner, native_owner=test_mesh_maintenance; require a model-derived child-suite split and an independently declared current inventory of every required surface/obligation/member/cell/case/shard; require registered owners, explicit skips, and terminal receipts with run identity, exit/status, result artifact, fingerprint, complete covered ids, inventory revision, and artifact/verifier versions; do not execute tests, decide semantic obligations, promote locally green subsets, or count PID/log/heartbeat/running/progress/release-only evidence as routine pass; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions; claim only current parent-gate scope."
