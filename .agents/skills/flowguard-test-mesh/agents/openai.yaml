interface:
  display_name: "FlowGuard Test Mesh"
  short_description: "Govern layered test ownership and freshness"
  default_prompt: "Use $flowguard-test-mesh for route_id=test_mesh_maintenance, role=public_owner, native_owner=test_mesh_maintenance; require a model-derived child-suite split, owned cells/shards, current final artifacts, explicit skips, and valid reuse proof; do not execute tests, decide semantic obligations, or count progress/release-only evidence as routine pass; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions; claim only current parent-gate scope."
