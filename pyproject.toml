[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "flowguard"
version = "0.1.3"
description = "Model-first function-flow engineering checks for AI coding agents."
requires-python = ">=3.10"
dependencies = []

[project.scripts]
flowguard = "flowguard.__main__:main"

[tool.setuptools.packages.find]
include = ["flowguard*"]
