name: FlowGuard CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenSpec
        run: npm install -g @fission-ai/openspec@1.3.1

      - name: Install FlowGuard
        run: python -m pip install -e .

      - name: Project audit
        run: python -m flowguard project-audit --root .

      - name: OpenSpec strict validation
        run: openspec validate --all --strict

      - name: Self-maintenance model checks
        run: python .flowguard/self_maintenance_mesh/run_checks.py

      - name: Focused unit tests
        run: python -m unittest tests.test_api_surface tests.test_skill_docs tests.test_project_adoption tests.test_public_templates
