name: FlowGuard CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_deep_checks:
        description: "Run full unit and aggregate FlowGuard model regression checks"
        required: false
        default: "true"
  schedule:
    - cron: "17 4 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fast-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenSpec
        run: npm install -g @fission-ai/openspec@1.3.1

      - name: Install FlowGuard
        run: python -m pip install -e .

      - name: Project audit
        run: python -m flowguard project-audit --root .

      - name: OpenSpec strict validation
        run: openspec validate --all --strict

      - name: Self-maintenance model checks
        run: python .flowguard/self_maintenance_mesh/run_checks.py

      - name: Focused unit tests
        run: python -m unittest tests.test_api_surface tests.test_skill_docs tests.test_project_adoption tests.test_public_templates

  deep-checks:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_deep_checks == 'true')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenSpec
        run: npm install -g @fission-ai/openspec@1.3.1

      - name: Install FlowGuard
        run: python -m pip install -e .

      - name: Project audit
        run: python -m flowguard project-audit --root .

      - name: OpenSpec strict validation
        run: openspec validate --all --strict

      - name: Full unit regression
        run: python -m unittest discover -s tests

      - name: Aggregate FlowGuard model regressions
        run: python scripts/run_flowguard_model_regressions.py --root .
